apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: polaris
  labels:
    app: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: frontend

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: polaris
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # Stage G hardening: dedicated SA, no K8s API access required.
      # NOTE: frontend Dockerfile uses stock `nginx:alpine` which starts as root
      # in order to bind port 80. To run fully non-root we must either:
      #   (a) switch the base image to nginxinc/nginx-unprivileged (binds :8080), or
      #   (b) add CAP_NET_BIND_SERVICE back via capabilities.add.
      # Until the Dockerfile is swapped (follow-up), we drop caps + disable priv
      # escalation but do NOT set runAsNonRoot — the container would crash-loop.
      # Tracked for a follow-up PR alongside the unprivileged-nginx migration.
      serviceAccountName: frontend-sa
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: frontend
        image: polaris/frontend:latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
            # NOTE: stock nginx needs NET_BIND_SERVICE to listen on :80. After
            # migrating to nginxinc/nginx-unprivileged, drop the add: block.
            add:
            - NET_BIND_SERVICE
          # readOnlyRootFilesystem omitted: nginx writes pid + cache files.
        ports:
        - containerPort: 80
          name: http
        env:
        - name: VITE_API_URL
          value: "https://api.polaris.music"
        - name: VITE_GRAPHQL_URL
          value: "https://api.polaris.music/graphql"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: polaris
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
