name: Frontend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - 'shared/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - 'shared/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  test:
    name: Test Frontend
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    - name: Run linter
      working-directory: frontend
      run: npm run lint --if-present || echo "Linting not configured"

    - name: Run tests
      working-directory: frontend
      run: npm test --if-present || echo "Tests not configured"

    - name: Build production bundle
      working-directory: frontend
      run: npm run build

    - name: Check bundle size
      working-directory: frontend
      run: |
        SIZE=$(du -sb dist | cut -f1)
        echo "Bundle size: $SIZE bytes"
        if [ $SIZE -gt 10485760 ]; then
          echo "::warning::Bundle size exceeds 10MB"
        fi

    # CSP regression net for the production HTML. Validates that the strict
    # CSP at frontend/visualization.html is honored after vite-build:
    # no inline scripts, no unsafe-eval/unsafe-inline in script-src, all
    # script srcs same-origin. Lives in the backend Jest suite so we
    # install backend deps too. Only runs on the most recent node matrix
    # leg to avoid duplicate work.
    - name: Install backend deps (for CSP test runner)
      if: matrix.node-version == '20.x'
      working-directory: backend
      run: npm ci

    - name: Static CSP audit on dist/
      if: matrix.node-version == '20.x'
      working-directory: backend
      run: node --experimental-vm-modules node_modules/jest/bin/jest.js --config=test/jest.config.js test/frontend/dist-csp.test.js

  e2e:
    # Runtime CSP regression. Loads dist/visualization.html under headless
    # Chromium and asserts no securitypolicyviolation events fire. Static
    # counterpart in `test` job catches inline-script/CSP-shape regressions
    # without browsers; this layer catches violations at load-time (e.g. a
    # third-party script suddenly using eval). Skipped on push (run on PRs
    # only) — and skippable entirely via `FRONTEND_E2E_SKIP=true` for fork
    # / sandbox environments where the playwright browser download fails.
    name: E2E (Playwright CSP)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend deps
      working-directory: frontend
      run: npm ci

    - name: Install Playwright Chromium
      working-directory: frontend
      run: npx playwright install --with-deps chromium

    - name: Build production bundle
      working-directory: frontend
      run: npm run build

    - name: Run Playwright tests
      working-directory: frontend
      run: npx playwright test
      env:
        CI: 'true'

    - name: Upload Playwright report on failure
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 7

  build:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

    - name: Build Docker image
      uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
      with:
        context: .
        file: ./frontend/Dockerfile
        push: false
        tags: polaris/frontend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
